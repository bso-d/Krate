services:
  amat-mwec-zookeeper:
    image: confluentinc/cp-zookeeper:latest
    hostname: amat-mwec-zookeeper
    container_name: amat-mwec-zookeeper
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "5"
    network_mode: host
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 5000
      ZOOKEEPER_INIT_LIMIT: 10
      ZOOKEEPER_SYNC_LIMIT: 3
      ZOOKEEPER_SERVER_1: 10.144.128.39:2888:3888
      ZOOKEEPER_DATA_DIR: /var/lib/zookeeper/data
      ZOOKEEPER_LOG_DIR: /var/lib/zookeeper/log
      ZOOKEEPER_MAX_CLIENT_CNXNS: 5000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok"
      ZOOKEEPER_AUTOPURGE_SNAP_RETAIN_COUNT: 3
      ZOOKEEPER_AUTOPURGE_PURGE_INTERVAL: 1
      ZOOKEEPER_ADMIN_SERVER_PORT: 8081
    volumes:
      - /data/kafka/zookeeper_data/data:/var/lib/zookeeper/data
      - /data/kafka/zookeeper_data/log:/var/lib/zookeeper/log

  amat-mwec-kafka-0:
    image: confluentinc/cp-kafka:latest
    hostname: amat-mwec-kafka-0
    container_name: amat-mwec-kafka-0
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "5"
    network_mode: host
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 240
      KAFKA_ZOOKEEPER_CONNECT: "10.144.128.39:2181"
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://10.144.128.39:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_NUM_PARTITIONS: 24
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 3
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - /data/kafka/kafka_data/kafka0:/var/lib/kafka/data

  amat-mwec-kafka-1:
    image: confluentinc/cp-kafka:latest
