# ZK cluster observability — single-cluster, self-contained.
# kafka-exporter connects to the running ZK brokers over their compose network,
# Prometheus scrapes + evaluates alert rules, Grafana serves provisioned dashboards.
#
# Brought up by:  kafka monitor up   (see zk/kafka)
# Requires the ZK cluster to be running first (external network zk_kafka-network).

name: zk-monitoring

networks:
  # The ZK cluster's network, so the exporter can reach kafka-92:9092 etc. by name.
  kafka-network:
    external: true
    name: zk_kafka-network
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:

services:
  # ── kafka-exporter — cluster/topic/consumer-group metrics as a Kafka client ──
  # No JMX javaagent needed: connects over the broker's PLAINTEXT listener and
  # exposes broker count, partitions, ISR/under-replication, and consumer lag.
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: zk-kafka-exporter
    restart: unless-stopped
    command:
      - --kafka.server=kafka-92:9092
      - --kafka.server=kafka-93:9093
      - --kafka.server=kafka-94:9094
      - --kafka.server=kafka-95:9095
      - --web.listen-address=:9308
    networks:
      - kafka-network
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ── Prometheus — metrics storage + alert-rule evaluation ─────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: zk-prometheus
    restart: unless-stopped
    ports:
      - "${PROM_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROM_RETENTION:-15d}
      - --web.enable-lifecycle
    networks:
      - monitoring
    depends_on:
      - kafka-exporter
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Grafana — provisioned datasource + dashboards ────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: zk-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    networks:
      - monitoring
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
